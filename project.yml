name: BlockPopper
options:
  bundleIdPrefix: com.blockpopper
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  BlockPopper:
    type: application
    platform: iOS
    sources:
      - BlockPopper
    settings:
      base:
        INFOPLIST_FILE: BlockPopper/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.blockpopper.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: BlockPopper/Info.plist
      properties:
        CFBundleName: Block Popper
        CFBundleDisplayName: Block Popper
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSUserTrackingUsageDescription: "We use tracking to show relevant ads"
        ITSAppUsesNonExemptEncryption: false

  BlockPopperTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BlockPopperTests
    dependencies:
      - target: BlockPopper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blockpopper.tests
